name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build SolidWorks add-in
        run: dotnet publish solidworks-addin/TrentCAD.SolidWorksAddin/TrentCAD.SolidWorksAddin.csproj -c Release -o build/solidworks-addin

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run package

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: TrentCAD-Installer
          path: dist/*.exe
          retention-days: 90
