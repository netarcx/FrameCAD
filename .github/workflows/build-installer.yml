name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # SolidWorks add-in only builds on Windows (the SW interop assemblies
      # are Windows-specific and the add-in only loads inside SolidWorks).
      # Mac and Linux are admin-only builds — they get the Electron app
      # without the SW add-in.
      - uses: actions/setup-dotnet@v4
        if: matrix.platform == 'win'
        with:
          dotnet-version: '8.x'

      - name: Build SolidWorks add-in
        if: matrix.platform == 'win'
        run: dotnet publish solidworks-addin/TrentCAD.SolidWorksAddin/TrentCAD.SolidWorksAddin.csproj -c Release -o build/solidworks-addin

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: npx electron-vite build && npx electron-builder --config electron-builder.yml --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # SHA-256 hex hash of the team admin PIN. When unset, the admin
          # page opens without a PIN prompt (dev fallback). To enable:
          # set this repo secret to the lowercase hex SHA-256 of your PIN.
          TRENTCAD_ADMIN_PIN_HASH: ${{ secrets.TRENTCAD_ADMIN_PIN_HASH }}
          # Defaults for the install-wide admin settings (Team + Browse).
          # Local clients override these via the welcome-screen admin page;
          # their overrides survive future updates unless they Reset.
          TRENTCAD_DEFAULT_GITHUB_ORG: ${{ secrets.TRENTCAD_DEFAULT_GITHUB_ORG }}
          TRENTCAD_DEFAULT_PROJECT_PREFIX: ${{ secrets.TRENTCAD_DEFAULT_PROJECT_PREFIX }}
          TRENTCAD_DEFAULT_TEAM_NAME: ${{ secrets.TRENTCAD_DEFAULT_TEAM_NAME }}
          TRENTCAD_DEFAULT_WELCOME_MESSAGE: ${{ secrets.TRENTCAD_DEFAULT_WELCOME_MESSAGE }}

      - name: Upload Windows installer artifact
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: TrentCAD-Installer-Windows
          path: |
            dist/*.exe
            !dist/*-uninstaller-*.exe
          retention-days: 90

      - name: Upload macOS installer artifact
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: TrentCAD-Installer-macOS
          path: dist/*.dmg
          retention-days: 90

      - name: Upload Linux installer artifact
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: TrentCAD-Installer-Linux
          path: dist/*.AppImage
          retention-days: 90

      - name: Upload add-in artifact
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: TrentCAD-SolidWorksAddin
          path: build/solidworks-addin/
          retention-days: 90
