name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Compute which platforms to build for this run. Windows on every
  # push; mac/linux only when the workflow is manually dispatched.
  # GitHub Actions doesn't allow `matrix` in job-level `if:`, so we
  # compute the matrix dynamically here and let `release` consume it
  # via `fromJSON`.
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
    steps:
      - id: compute
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'matrix={"include":[{"os":"windows-2022","platform":"win"},{"os":"macos-latest","platform":"mac"},{"os":"ubuntu-latest","platform":"linux"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"os":"windows-2022","platform":"win"},{"os":"ubuntu-latest","platform":"linux"}]}' >> "$GITHUB_OUTPUT"
          fi

  # Pre-create the GitHub Release (idempotent) BEFORE the matrix runs.
  # Without this, all three matrix jobs race to POST /releases and two
  # of them die with HTTP 422 "already_exists" — electron-builder
  # doesn't retry on that error. By guaranteeing the release exists
  # before any matrix job starts, electron-builder's GET succeeds on
  # every job and they all happily upload assets to the same release.
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - name: Ensure GitHub Release v${{ steps.version.outputs.version }} exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — matrix jobs will upload to it."
          else
            gh release create "$tag" \
              --title "$tag" \
              --notes "Auto-built from ${{ github.sha }}"
            echo "Created release $tag."
          fi

  release:
    needs: [prepare-matrix, prepare-release]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # SolidWorks add-in only builds on Windows (the SW interop assemblies
      # are Windows-specific and the add-in only loads inside SolidWorks).
      # Mac and Linux are admin-only builds — they get the Electron app
      # without the SW add-in.
      - uses: actions/setup-dotnet@v4
        if: matrix.platform == 'win'
        with:
          dotnet-version: '8.x'

      - name: Stamp add-in version from package.json
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $v = (Get-Content package.json -Raw | ConvertFrom-Json).version
          # Strip any prerelease suffix (e.g. "0.7.14-rc.1" -> "0.7.14")
          # because AssemblyVersion requires strict W.X.Y.Z numeric and
          # dotnet build errors on "Invalid Version Format" otherwise
          $numeric = $v -replace '-.*$', ''
          # AssemblyVersion uses W.X.Y.Z; package.json is W.X.Y so we append .0
          $stamp = "$numeric.0"
          $f = 'solidworks-addin/FrameCAD.SolidWorksAddin/Properties/AssemblyInfo.cs'
          $c = Get-Content $f -Raw
          $c = $c -replace 'AssemblyVersion\("[^"]+"\)', "AssemblyVersion(`"$stamp`")"
          $c = $c -replace 'AssemblyFileVersion\("[^"]+"\)', "AssemblyFileVersion(`"$stamp`")"
          Set-Content -Path $f -Value $c -NoNewline
          Write-Host "Stamped add-in AssemblyVersion=$stamp (from package.json version $v)"

      - name: Build SolidWorks add-in
        if: matrix.platform == 'win'
        run: dotnet publish solidworks-addin/FrameCAD.SolidWorksAddin/FrameCAD.SolidWorksAddin.csproj -c Release -o build/solidworks-addin

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: npx electron-vite build && npx electron-builder --config electron-builder.yml --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Build-time defaults baked into the installer. GitHub Actions
          # secret names stay TRENTCAD_* so they don't need to be re-added
          # post-rename; the build code now reads FRAMECAD_*, so we
          # bridge the two here. Rename the secrets if/when convenient.
          FRAMECAD_ADMIN_PIN_HASH: ${{ secrets.TRENTCAD_ADMIN_PIN_HASH }}
          FRAMECAD_DEFAULT_GITHUB_ORG: ${{ secrets.TRENTCAD_DEFAULT_GITHUB_ORG }}
          FRAMECAD_DEFAULT_PROJECT_PREFIX: ${{ secrets.TRENTCAD_DEFAULT_PROJECT_PREFIX }}
          FRAMECAD_DEFAULT_TEAM_NAME: ${{ secrets.TRENTCAD_DEFAULT_TEAM_NAME }}
          FRAMECAD_DEFAULT_WELCOME_MESSAGE: ${{ secrets.TRENTCAD_DEFAULT_WELCOME_MESSAGE }}

      - name: Upload Windows installer artifact
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: FrameCAD-Installer-Windows
          path: |
            dist/*.exe
            !dist/*-uninstaller-*.exe
          retention-days: 90

      - name: Upload macOS installer artifact
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: FrameCAD-Installer-macOS
          path: dist/*.dmg
          retention-days: 90

      - name: Upload Linux installer artifact
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: FrameCAD-Installer-Linux
          path: |
            dist/*.AppImage
            dist/*.deb
          retention-days: 90

      - name: Upload add-in artifact
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: FrameCAD-SolidWorksAddin
          path: build/solidworks-addin/
          retention-days: 90
