name: Build SolidWorks Add-in

on:
  push:
    paths:
      - 'solidworks-addin/**'
      - '.github/workflows/build-addin.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build add-in
        run: dotnet build solidworks-addin/TrentCAD.SolidWorksAddin/TrentCAD.SolidWorksAddin.csproj -c Release

      - name: Upload add-in artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrentCAD-SolidWorksAddin
          path: solidworks-addin/TrentCAD.SolidWorksAddin/bin/Release/net48/
          retention-days: 90
