# appId stays com.trentcad.app on purpose — preserves the auto-update
# chain from v1.0.x TrentCAD installs to v1.1.x FrameCAD releases.
# Existing installs match on appId, not productName.
appId: com.trentcad.app
productName: FrameCAD
protocols:
  - name: FrameCAD Project
    schemes:
      - framecad
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - node_modules/**/*
  - "!node_modules/**/*.md"
  - "!node_modules/**/*.map"
  - "!node_modules/**/test/**"
  - "!node_modules/**/tests/**"
  - "!node_modules/**/__tests__/**"
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${name}-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
  include: build/installer.nsh
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: ${name}-${version}-${arch}.${ext}
  category: public.app-category.developer-tools
  # Unsigned for now (no Apple Developer cert). First launch will show
  # the Gatekeeper "can't verify" warning; user can right-click → Open
  # once to trust. Auto-update via electron-updater requires signing,
  # so Mac users will need to manually download new versions until a
  # signing cert is added.
  identity: null
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  artifactName: ${name}-${version}.${ext}
  category: Development
  executableArgs:
    - "--no-sandbox"
# `channel: latest` forces electron-builder to write latest.yml even
# when the version contains a prerelease tag like "-beta". Without
# this, prerelease versions publish to beta.yml only, and users on
# the stable channel never see them. We run a single update channel
# where every published build (stable or beta) is the next update for
# everyone.
publish:
  provider: github
  owner: netarcx
  repo: framecad
  releaseType: release
  channel: latest
