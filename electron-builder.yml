appId: com.trentcad.app
productName: TrentCAD
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - node_modules/**/*
  - "!node_modules/**/*.md"
  - "!node_modules/**/*.map"
  - "!node_modules/**/test/**"
  - "!node_modules/**/tests/**"
  - "!node_modules/**/__tests__/**"
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${name}-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
  include: build/installer.nsh
linux:
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: ${name}-${version}.${ext}
publish:
  provider: github
  owner: netarcx
  repo: TrentCAD
  releaseType: release
