appId: com.trentcad.app
productName: TrentCAD
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - node_modules/**/*
  - "!node_modules/**/*.md"
  - "!node_modules/**/*.map"
  - "!node_modules/**/test/**"
  - "!node_modules/**/tests/**"
  - "!node_modules/**/__tests__/**"
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${name}-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
  include: build/installer.nsh
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: ${name}-${version}-${arch}.${ext}
  category: public.app-category.developer-tools
  # Unsigned for now (no Apple Developer cert). First launch will show
  # the Gatekeeper "can't verify" warning; user can right-click → Open
  # once to trust. Auto-update via electron-updater requires signing,
  # so Mac users will need to manually download new versions until a
  # signing cert is added.
  identity: null
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  artifactName: ${name}-${version}.${ext}
  category: Development
  executableArgs:
    - "--no-sandbox"
publish:
  provider: github
  owner: netarcx
  repo: TrentCAD
  releaseType: release
